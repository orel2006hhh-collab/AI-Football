<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KARMA RACER — 3D Гоночная игра</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Orbitron', 'Courier New', monospace;
        }
        
        .hud {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            border: 1px solid rgba(0, 255, 100, 0.5);
            color: #0ff;
            z-index: 100;
            font-weight: bold;
            font-family: 'Orbitron', monospace;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #0ff;
        }
        
        .speedometer {
            background: linear-gradient(135deg, #000, #1a1a2a);
            padding: 8px 25px;
            border-radius: 30px;
            border: 1px solid #0ff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }
        
        .speed-value {
            font-size: 28px;
            font-weight: bold;
            color: #0ff;
        }
        
        .score-board, .best-score {
            background: linear-gradient(135deg, #000, #1a1a2a);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid #ff0;
            box-shadow: 0 0 15px rgba(255, 255, 0, 0.3);
        }
        
        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #000, #1a1a2a);
            border: 2px solid #ff3300;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            z-index: 200;
            color: white;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.5);
            min-width: 400px;
        }
        
        .game-over-title {
            font-size: 48px;
            font-weight: bold;
            color: #ff3300;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff3300;
        }
        
        .restart-btn {
            background: linear-gradient(135deg, #ff3300, #ff6600);
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            color: white;
            transition: 0.2s;
        }
        
        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 51, 0, 0.5);
        }
        
        .controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 15px;
            color: #0ff;
            font-size: 12px;
            font-family: monospace;
            backdrop-filter: blur(5px);
            z-index: 100;
        }
        
        @media (max-width: 800px) {
            .hud { font-size: 10px; padding: 10px 15px; }
            .speed-value { font-size: 18px; }
            .game-over-title { font-size: 28px; }
            .game-over { min-width: 300px; padding: 25px; }
        }
    </style>
</head>
<body>
    <div class="hud">
        <div class="speedometer">
            🏁 <span class="speed-value" id="speedValue">0</span> <span style="font-size:12px">KM/H</span>
        </div>
        <div class="score-board">
            🎯 SCORE: <span id="scoreValue">0</span>
        </div>
        <div class="best-score">
            🏆 BEST: <span id="bestScoreValue">0</span>
        </div>
    </div>
    
    <div class="controls">
        🎮 A/D или ←/→ — управление | 🚀 Набирайте очки, объезжая препятствия
    </div>
    
    <div class="game-over" id="gameOver" style="display: none;">
        <div class="game-over-title" id="gameOverTitle">GAME OVER</div>
        <div style="font-size: 20px; margin-bottom: 10px;">Ваш счёт: <span id="finalScore">0</span></div>
        <div style="font-size: 16px; margin-bottom: 20px; color: #0ff;">Лучший: <span id="bestScoreFinal">0</span></div>
        <button class="restart-btn" id="restartBtn">🔄 НАЧАТЬ ЗАНОВО</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        
        // Инициализация сцены
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008);
        
        // Камера (вид от третьего лица за машиной)
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 8);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        
        // Освещение
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(5, 10, 7);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x4466ff, 0.5);
        fillLight.position.set(0, 5, 0);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0xff6600, 0.3);
        backLight.position.set(0, 2, -5);
        scene.add(backLight);
        
        // Дорожное покрытие
        const roadMaterial = new THREE.MeshStandardMaterial({ color: 0x2a2a3a, roughness: 0.4, metalness: 0.7 });
        const road = new THREE.Mesh(new THREE.PlaneGeometry(12, 200), roadMaterial);
        road.rotation.x = -Math.PI / 2;
        road.position.y = -0.5;
        road.receiveShadow = true;
        scene.add(road);
        
        // Разметка дороги
        const lineMaterial = new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0x442200 });
        for (let z = -50; z <= 50; z += 2) {
            const line = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 0.5), lineMaterial);
            line.position.set(0, -0.4, z);
            line.castShadow = true;
            scene.add(line);
        }
        
        // Бордюры
        const curbMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.3 });
        for (let side of [-6, 6]) {
            for (let z = -50; z <= 50; z += 1) {
                const curb = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 1), curbMat);
                curb.position.set(side, -0.3, z);
                curb.castShadow = true;
                scene.add(curb);
            }
        }
        
        // Небо (купол)
        const skyTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#0a1030';
            ctx.fillRect(0, 0, 512, 512);
            ctx.fillStyle = '#1a2a4a';
            for (let i = 0; i < 200; i++) {
                ctx.fillRect(Math.random() * 512, Math.random() * 512, 1, 1);
            }
            return new THREE.CanvasTexture(canvas);
        };
        
        const skyMaterial = new THREE.MeshStandardMaterial({ color: 0x0a1030, emissive: 0x0a1030 });
        const skyDome = new THREE.Mesh(new THREE.SphereGeometry(200, 32, 32), skyMaterial);
        skyDome.scale.set(1, 0.4, 1);
        scene.add(skyDome);
        
        // Машина игрока (спортивный автомобиль)
        const carGroup = new THREE.Group();
        
        // Кузов
        const bodyGeo = new THREE.BoxGeometry(0.9, 0.4, 1.8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff3333, metalness: 0.8, roughness: 0.2 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.2;
        body.castShadow = true;
        carGroup.add(body);
        
        // Кабина
        const cabinGeo = new THREE.BoxGeometry(0.7, 0.3, 0.8);
        const cabinMat = new THREE.MeshStandardMaterial({ color: 0x33aaff, metalness: 0.9, roughness: 0.1 });
        const cabin = new THREE.Mesh(cabinGeo, cabinMat);
        cabin.position.set(0, 0.45, -0.2);
        cabin.castShadow = true;
        carGroup.add(cabin);
        
        // Крыша
        const roofGeo = new THREE.BoxGeometry(0.75, 0.15, 0.85);
        const roofMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.7 });
        const roof = new THREE.Mesh(roofGeo, roofMat);
        roof.position.set(0, 0.65, -0.2);
        roof.castShadow = true;
        carGroup.add(roof);
        
        // Колёса
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.3, roughness: 0.5 });
        const wheelGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.4, 24);
        const positions = [[-0.6, 0.1, 0.7], [0.6, 0.1, 0.7], [-0.6, 0.1, -0.7], [0.6, 0.1, -0.7]];
        positions.forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.rotation.z = Math.PI / 2;
            wheel.position.set(pos[0], pos[1], pos[2]);
            wheel.castShadow = true;
            carGroup.add(wheel);
        });
        
        // Фары
        const lightMat = new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff4400 });
        const leftLight = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), lightMat);
        leftLight.position.set(-0.4, 0.2, 0.95);
        const rightLight = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), lightMat);
        rightLight.position.set(0.4, 0.2, 0.95);
        carGroup.add(leftLight);
        carGroup.add(rightLight);
        
        carGroup.position.y = 0;
        scene.add(carGroup);
        
        // Препятствия (машины-соперники)
        let obstacles = [];
        let score = 0;
        let bestScore = localStorage.getItem('bestScore') || 0;
        let gameActive = true;
        let speed = 0;
        let carX = 0;
        let lastTime = 0;
        
        document.getElementById('bestScoreValue').innerText = bestScore;
        
        function updateHUD() {
            document.getElementById('speedValue').innerText = Math.floor(Math.abs(speed) * 20);
            document.getElementById('scoreValue').innerText = Math.floor(score);
        }
        
        function createObstacle(x, z) {
            const group = new THREE.Group();
            
            // Кузов
            const bodyGeo = new THREE.BoxGeometry(0.85, 0.4, 1.7);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x44aa44, metalness: 0.5 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.2;
            body.castShadow = true;
            group.add(body);
            
            // Кабина
            const cabinMat = new THREE.MeshStandardMaterial({ color: 0x88ccff });
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.28, 0.75), cabinMat);
            cabin.position.set(0, 0.45, -0.2);
            cabin.castShadow = true;
            group.add(cabin);
            
            // Колёса
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const wheelGeo = new THREE.CylinderGeometry(0.28, 0.28, 0.35, 16);
            const wheelPos = [[-0.55, 0.1, 0.65], [0.55, 0.1, 0.65], [-0.55, 0.1, -0.65], [0.55, 0.1, -0.65]];
            wheelPos.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(pos[0], pos[1], pos[2]);
                wheel.castShadow = true;
                group.add(wheel);
            });
            
            group.position.set(x, 0, z);
            scene.add(group);
            return group;
        }
        
        function spawnObstacle() {
            const lane = (Math.random() - 0.5) * 5;
            const obstacle = createObstacle(lane, -30);
            obstacles.push(obstacle);
        }
        
        function checkCollision() {
            for (let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];
                const dx = carGroup.position.x - obs.position.x;
                const dz = carGroup.position.z - obs.position.z;
                const dist = Math.sqrt(dx * dx + dz * dz);
                if (dist < 1.0 && gameActive) {
                    gameActive = false;
                    endGame();
                }
            }
        }
        
        function endGame() {
            const finalScore = Math.floor(score);
            document.getElementById('finalScore').innerText = finalScore;
            document.getElementById('bestScoreFinal').innerText = bestScore;
            document.getElementById('gameOver').style.display = 'block';
            
            if (finalScore > bestScore) {
                bestScore = finalScore;
                localStorage.setItem('bestScore', bestScore);
                document.getElementById('bestScoreValue').innerText = bestScore;
            }
        }
        
        function restartGame() {
            obstacles.forEach(obs => scene.remove(obs));
            obstacles = [];
            score = 0;
            speed = 0;
            carX = 0;
            carGroup.position.x = 0;
            carGroup.position.z = 0;
            gameActive = true;
            updateHUD();
            document.getElementById('gameOver').style.display = 'none';
            
            for (let i = 0; i < 5; i++) {
                spawnObstacle();
            }
        }
        
        // Управление
        const keys = { left: false, right: false };
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
            if (e.key === ' ' && !gameActive) restartGame();
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
        });
        
        document.getElementById('restartBtn').addEventListener('click', () => {
            restartGame();
        });
        
        // Анимация
        let particles = [];
        
        function createDust() {
            const dustMat = new THREE.MeshStandardMaterial({ color: 0x888888, emissive: 0x442200 });
            const dust = new THREE.Mesh(new THREE.SphereGeometry(0.1, 4, 4), dustMat);
            dust.position.set((Math.random() - 0.5) * 2, -0.2, -1.5);
            carGroup.add(dust);
            setTimeout(() => carGroup.remove(dust), 200);
        }
        
        // Камера, следующая за машиной
        function updateCamera() {
            const targetX = carGroup.position.x * 0.5;
            camera.position.x += (targetX - camera.position.x) * 0.1;
            camera.position.y = 3 + Math.abs(speed) * 0.5;
            camera.lookAt(carGroup.position.x, 0, carGroup.position.z + 5);
        }
        
        function animate() {
            if (gameActive) {
                // Управление машиной
                let turn = 0;
                if (keys.left) turn = -1;
                if (keys.right) turn = 1;
                
                // Ускорение и торможение
                speed += 0.02;
                speed = Math.min(speed, 2.5);
                
                carX += turn * 0.08;
                carX = Math.min(Math.max(carX, -4.5), 4.5);
                carGroup.position.x = carX;
                carGroup.position.z += speed;
                
                // Поворот руля
                carGroup.rotation.y = turn * 0.15;
                carGroup.rotation.x = Math.sin(Date.now() * 0.01) * 0.02;
                
                // Дым из под колёс
                if (speed > 1.5 && Math.random() > 0.7) createDust();
                
                // Обновление счёта
                score += speed * 1.5;
                updateHUD();
                
                // Спавн препятствий
                if (Math.random() < 0.02) spawnObstacle();
                
                // Движение препятствий
                for (let i = 0; i < obstacles.length; i++) {
                    obstacles[i].position.z += speed;
                    if (obstacles[i].position.z > 15) {
                        scene.remove(obstacles[i]);
                        obstacles.splice(i, 1);
                        i--;
                    }
                }
                
                // Проверка коллизии
                checkCollision();
                
                updateCamera();
            }
            
            // Анимация света фар
            const intensity = 0.5 + Math.random() * 0.3;
            backLight.intensity = intensity;
            
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        // Стартовые препятствия
        for (let i = 0; i < 5; i++) {
            spawnObstacle();
        }
        
        // Звёзды на небе
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1000;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 400;
            starPositions[i*3+1] = (Math.random() - 0.5) * 100 + 20;
            starPositions[i*3+2] = (Math.random() - 0.5) * 100 - 50;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
