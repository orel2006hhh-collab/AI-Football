<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PLATFORMER ADVENTURE — Прыгай и собирай!</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f2a 0%, #1a1f4a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
        }
        
        .game-container {
            position: relative;
            background: #000;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 12px;
            cursor: pointer;
        }
        
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid #ffd700;
            color: #ffd700;
            font-weight: bold;
            z-index: 10;
            font-size: 18px;
        }
        
        .score, .coins {
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #000, #1a0a0a);
            border: 2px solid #ff3300;
            border-radius: 30px;
            padding: 30px 50px;
            text-align: center;
            z-index: 20;
            color: white;
            backdrop-filter: blur(10px);
        }
        
        .game-over h2 {
            font-size: 36px;
            color: #ff3300;
            margin-bottom: 20px;
        }
        
        .restart-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border: none;
            padding: 10px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.2s;
        }
        
        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 20px;
            color: #ffd700;
            font-size: 12px;
            z-index: 10;
        }
        
        @media (max-width: 900px) {
            .hud { font-size: 12px; padding: 6px 12px; }
            .game-over h2 { font-size: 24px; }
            .game-over { padding: 20px 30px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="1000" height="550"></canvas>
    
    <div class="hud">
        <div class="score">⭐ СЧЁТ: <span id="scoreValue">0</span></div>
        <div class="coins">🪙 МОНЕТЫ: <span id="coinsValue">0</span></div>
    </div>
    
    <div class="controls">
        🎮 A/D или ←/→ — движение | ПРОБЕЛ или ↑ — прыжок
    </div>
    
    <div class="game-over" id="gameOver" style="display: none;">
        <h2>💀 GAME OVER 💀</h2>
        <div style="font-size: 18px; margin: 10px 0;">Ваш счёт: <span id="finalScore">0</span></div>
        <div style="font-size: 14px; margin-bottom: 15px;">Монет собрано: <span id="finalCoins">0</span></div>
        <button class="restart-btn" id="restartBtn">🔄 ИГРАТЬ СНОВА</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Размеры игрового мира
    const GAME_WIDTH = 3000;
    const GRAVITY = 0.5;
    const JUMP_POWER = -9;
    
    // Камера
    let cameraX = 0;
    
    // Игрок
    let player = {
        x: 100,
        y: 450,
        vx: 0,
        vy: 0,
        width: 30,
        height: 35,
        onGround: true,
        facingRight: true
    };
    
    // Платформы
    let platforms = [];
    
    // Монеты
    let coins = [];
    
    // Враги
    let enemies = [];
    
    // Игровые переменные
    let score = 0;
    let coinsCollected = 0;
    let gameRunning = true;
    let animFrame;
    
    // Управление
    const keys = { left: false, right: false, jump: false };
    
    // Флаги для прыжка
    let canJump = true;
    let jumpPressed = false;
    
    // ============ СОЗДАНИЕ УРОВНЯ ============
    function createLevel() {
        // Земля (основание)
        platforms.push({ x: 0, y: 520, width: GAME_WIDTH, height: 30, color: '#5a3a1a' });
        
        // Платформы
        const platformList = [
            { x: 200, y: 470, width: 80, height: 20 },
            { x: 350, y: 430, width: 70, height: 20 },
            { x: 500, y: 470, width: 100, height: 20 },
            { x: 680, y: 420, width: 60, height: 20 },
            { x: 800, y: 380, width: 70, height: 20 },
            { x: 950, y: 440, width: 80, height: 20 },
            { x: 1100, y: 390, width: 65, height: 20 },
            { x: 1250, y: 460, width: 90, height: 20 },
            { x: 1400, y: 410, width: 70, height: 20 },
            { x: 1550, y: 360, width: 60, height: 20 },
            { x: 1680, y: 430, width: 80, height: 20 },
            { x: 1850, y: 480, width: 100, height: 20 },
            { x: 2000, y: 400, width: 70, height: 20 },
            { x: 2150, y: 350, width: 65, height: 20 },
            { x: 2300, y: 420, width: 80, height: 20 },
            { x: 2450, y: 370, width: 70, height: 20 },
            { x: 2600, y: 450, width: 90, height: 20 },
            { x: 2750, y: 390, width: 65, height: 20 },
            { x: 2900, y: 350, width: 60, height: 20 }
        ];
        
        platformList.forEach(p => {
            platforms.push({ 
                x: p.x, y: p.y, width: p.width, height: p.height, 
                color: '#8B5A2B', borderColor: '#D2A679' 
            });
        });
        
        // Монеты
        const coinPositions = [
            [220, 440], [370, 400], [520, 440], [700, 390], [820, 350],
            [970, 410], [1120, 360], [1270, 430], [1420, 380], [1570, 330],
            [1700, 400], [1880, 450], [2020, 370], [2170, 320], [2320, 390],
            [2470, 340], [2630, 420], [2770, 360], [2920, 320]
        ];
        
        coinPositions.forEach(pos => {
            coins.push({ x: pos[0], y: pos[1], width: 12, height: 12, collected: false });
        });
        
        // Добавим дополнительные монеты на земле
        for (let i = 300; i < GAME_WIDTH - 100; i += 150) {
            if (Math.random() > 0.4) {
                coins.push({ x: i, y: 495, width: 12, height: 12, collected: false });
            }
        }
        
        // Враги (двигающиеся)
        const enemyPositions = [
            { x: 400, y: 455, type: 'walker', direction: 1, range: 100 },
            { x: 750, y: 405, type: 'walker', direction: -1, range: 100 },
            { x: 1050, y: 425, type: 'walker', direction: 1, range: 80 },
            { x: 1350, y: 445, type: 'walker', direction: -1, range: 120 },
            { x: 1650, y: 345, type: 'walker', direction: 1, range: 90 },
            { x: 1950, y: 465, type: 'walker', direction: -1, range: 100 },
            { x: 2250, y: 335, type: 'walker', direction: 1, range: 80 },
            { x: 2550, y: 435, type: 'walker', direction: -1, range: 100 }
        ];
        
        enemyPositions.forEach(pos => {
            enemies.push({
                x: pos.x, y: pos.y, width: 28, height: 28,
                type: pos.type,
                direction: pos.direction,
                startX: pos.x,
                range: pos.range,
                alive: true
            });
        });
    }
    
    // ============ РИСОВАНИЕ ============
    function drawBackground() {
        // Небо с градиентом
        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, '#1a2a4a');
        gradient.addColorStop(1, '#4a6a8a');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Облака
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        const cloudX = (cameraX * 0.3) % 400;
        for (let i = -200; i < canvas.width + 200; i += 200) {
            ctx.beginPath();
            ctx.ellipse(cloudX + i, 70, 40, 30, 0, 0, Math.PI * 2);
            ctx.ellipse(cloudX + i + 40, 60, 35, 28, 0, 0, Math.PI * 2);
            ctx.ellipse(cloudX + i - 30, 65, 35, 28, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // Солнце
        ctx.fillStyle = '#ffdd77';
        ctx.shadowBlur = 30;
        ctx.shadowColor = '#ffaa33';
        ctx.beginPath();
        ctx.arc(canvas.width - 60, 60, 40, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
    
    function drawPlatforms() {
        for (let p of platforms) {
            // Тень платформы
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(p.x - cameraX, p.y + 3, p.width, p.height);
            
            // Основная платформа
            const grad = ctx.createLinearGradient(p.x - cameraX, p.y, p.x - cameraX, p.y + p.height);
            grad.addColorStop(0, '#9B5A2B');
            grad.addColorStop(1, '#6B3A1A');
            ctx.fillStyle = grad;
            ctx.fillRect(p.x - cameraX, p.y, p.width, p.height);
            
            // Детали платформы
            ctx.fillStyle = '#D2A679';
            ctx.fillRect(p.x - cameraX + 5, p.y - 3, p.width - 10, 5);
            ctx.fillStyle = '#4a2a0a';
            for (let i = 0; i < p.width; i += 20) {
                ctx.fillRect(p.x - cameraX + i, p.y + 5, 8, 5);
            }
        }
    }
    
    function drawPlayer() {
        const x = player.x - cameraX;
        const y = player.y;
        
        // Тень под игроком
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath();
        ctx.ellipse(x + 15, y + 32, 18, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Ноги (анимация при ходьбе)
        const legOffset = player.vx !== 0 ? Math.sin(Date.now() * 0.015) * 5 : 0;
        
        ctx.fillStyle = '#2255aa';
        ctx.fillRect(x + 5, y + 18, 8, 12);
        ctx.fillRect(x + 17, y + 18, 8, 12);
        
        // Тело (комбинезон)
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(x + 5, y, 20, 28);
        
        // Грудь
        ctx.fillStyle = '#ff6666';
        ctx.fillRect(x + 8, y + 5, 14, 12);
        
        // Голова
        ctx.fillStyle = '#ffcc99';
        ctx.beginPath();
        ctx.ellipse(x + 15, y - 5, 12, 14, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Шляпа
        ctx.fillStyle = '#cc3333';
        ctx.fillRect(x + 3, y - 15, 24, 10);
        ctx.fillRect(x + 8, y - 22, 14, 10);
        
        // Глаза
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(x + 10, y - 7, 2, 0, Math.PI * 2);
        ctx.arc(x + 20, y - 7, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(x + 9, y - 8, 0.8, 0, Math.PI * 2);
        ctx.arc(x + 19, y - 8, 0.8, 0, Math.PI * 2);
        ctx.fill();
        
        // Усы
        ctx.beginPath();
        ctx.moveTo(x + 12, y - 3);
        ctx.lineTo(x + 6, y - 1);
        ctx.lineTo(x + 12, y);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(x + 18, y - 3);
        ctx.lineTo(x + 24, y - 1);
        ctx.lineTo(x + 18, y);
        ctx.fill();
        
        // Направление взгляда
        if (player.facingRight) {
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x + 22, y - 7, 2, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    
    function drawCoins() {
        for (let coin of coins) {
            if (coin.collected) continue;
            
            const x = coin.x - cameraX;
            const y = coin.y;
            
            // Анимация вращения монеты
            const angle = Date.now() * 0.008;
            const scale = 1 + Math.sin(angle * 3) * 0.1;
            
            ctx.save();
            ctx.translate(x + 6, y + 6);
            ctx.scale(scale, scale);
            ctx.fillStyle = '#ffd700';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ffaa00';
            ctx.beginPath();
            ctx.ellipse(0, 0, 7, 7, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ffaa00';
            ctx.beginPath();
            ctx.ellipse(0, 0, 5, 5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 12px monospace';
            ctx.fillText('★', -4, 4);
            ctx.restore();
        }
        ctx.shadowBlur = 0;
    }
    
    function drawEnemies() {
        for (let enemy of enemies) {
            if (!enemy.alive) continue;
            
            const x = enemy.x - cameraX;
            const y = enemy.y;
            
            ctx.fillStyle = '#2a6a2a';
            ctx.fillRect(x, y, enemy.width, enemy.height);
            
            ctx.fillStyle = '#3a9a3a';
            ctx.fillRect(x + 4, y + 4, 20, 12);
            
            ctx.fillStyle = '#000';
            ctx.fillRect(x + 5, y + 8, 5, 8);
            ctx.fillRect(x + 18, y + 8, 5, 8);
            
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.arc(x + 14, y + 6, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(x + 12, y + 5, 1.5, 0, Math.PI * 2);
            ctx.arc(x + 16, y + 5, 1.5, 0, Math.PI * 2);
            ctx.fill();
            
            // Глаза-зрачки (следят за игроком)
            const eyeX = (player.x - enemy.x) * 0.02;
            const eyeY = (player.y - enemy.y) * 0.02;
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x + 12 + Math.min(3, Math.max(-3, eyeX)), y + 5 + Math.min(2, Math.max(-2, eyeY)), 1, 0, Math.PI * 2);
            ctx.arc(x + 16 + Math.min(3, Math.max(-3, eyeX)), y + 5 + Math.min(2, Math.max(-2, eyeY)), 1, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    
    function drawUI() {
        document.getElementById('scoreValue').innerText = Math.floor(score);
        document.getElementById('coinsValue').innerText = coinsCollected;
    }
    
    // ============ ФИЗИКА И КОЛЛИЗИИ ============
    function updatePlayer() {
        // Горизонтальное движение
        player.vx = 0;
        if (keys.left) {
            player.vx = -5;
            player.facingRight = false;
        }
        if (keys.right) {
            player.vx = 5;
            player.facingRight = true;
        }
        
        player.x += player.vx;
        player.x = Math.max(20, Math.min(GAME_WIDTH - player.width - 20, player.x));
        
        // Гравитация
        player.vy += GRAVITY;
        player.y += player.vy;
        
        // Проверка столкновений с платформами
        player.onGround = false;
        for (let p of platforms) {
            if (player.y + player.height > p.y && player.y < p.y + p.height &&
                player.x + player.width > p.x && player.x < p.x + p.width) {
                if (player.vy >= 0 && player.y + player.height - p.y <= 15) {
                    player.y = p.y - player.height;
                    player.vy = 0;
                    player.onGround = true;
                    canJump = true;
                } else if (player.vy < 0) {
                    player.y = p.y + p.height;
                    player.vy = 0;
                }
            }
        }
        
        // Падение в бездну
        if (player.y > canvas.height + 100) {
            gameRunning = false;
        }
        
        // Прыжок
        if (keys.jump && player.onGround && canJump) {
            player.vy = JUMP_POWER;
            player.onGround = false;
            canJump = false;
        }
        
        // Сброс флага прыжка
        if (!keys.jump) {
            jumpPressed = false;
        }
    }
    
    function updateCoins() {
        for (let coin of coins) {
            if (!coin.collected && 
                player.x + player.width > coin.x &&
                player.x < coin.x + coin.width &&
                player.y + player.height > coin.y &&
                player.y < coin.y + coin.height) {
                coin.collected = true;
                coinsCollected++;
                score += 10;
                drawUI();
            }
        }
    }
    
    function updateEnemies() {
        for (let enemy of enemies) {
            if (!enemy.alive) continue;
            
            // Движение врага
            if (enemy.type === 'walker') {
                enemy.x += enemy.direction * 1.5;
                if (enemy.x > enemy.startX + enemy.range) {
                    enemy.x = enemy.startX + enemy.range;
                    enemy.direction = -1;
                }
                if (enemy.x < enemy.startX - enemy.range) {
                    enemy.x = enemy.startX - enemy.range;
                    enemy.direction = 1;
                }
            }
            
            // Проверка столкновения с игроком
            if (player.x + player.width > enemy.x &&
                player.x < enemy.x + enemy.width &&
                player.y + player.height > enemy.y &&
                player.y < enemy.y + enemy.height) {
                
                // Если игрок падает на врага сверху
                if (player.vy > 0 && player.y + player.height - enemy.y <= 15) {
                    enemy.alive = false;
                    score += 50;
                    player.vy = -7;
                    drawUI();
                } else {
                    gameRunning = false;
                }
            }
        }
    }
    
    function updateCamera() {
        // Камера следует за игроком
        cameraX = player.x + player.width / 2 - canvas.width / 2;
        cameraX = Math.max(0, Math.min(GAME_WIDTH - canvas.width, cameraX));
    }
    
    // ============ УПРАВЛЕНИЕ ============
    document.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if (key === 'a' || key === 'arrowleft') keys.left = true;
        if (key === 'd' || key === 'arrowright') keys.right = true;
        if (key === ' ' || key === 'arrowup' || key === 'w') {
            keys.jump = true;
            e.preventDefault();
        }
    });
    
    document.addEventListener('keyup', (e) => {
        const key = e.key.toLowerCase();
        if (key === 'a' || key === 'arrowleft') keys.left = false;
        if (key === 'd' || key === 'arrowright') keys.right = false;
        if (key === ' ' || key === 'arrowup' || key === 'w') {
            keys.jump = false;
        }
    });
    
    // Защита от прокрутки страницы при нажатии пробела
    window.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
            e.preventDefault();
        }
    });
    
    // ============ ПЕРЕЗАПУСК ============
    function restartGame() {
        // Сброс переменных
        player = {
            x: 100, y: 450, vx: 0, vy: 0, width: 30, height: 35,
            onGround: true, facingRight: true
        };
        platforms = [];
        coins = [];
        enemies = [];
        score = 0;
        coinsCollected = 0;
        gameRunning = true;
        cameraX = 0;
        
        createLevel();
        drawUI();
        document.getElementById('gameOver').style.display = 'none';
        
        // Перезапуск анимации
        if (animFrame) cancelAnimationFrame(animFrame);
        animate();
    }
    
    document.getElementById('restartBtn').addEventListener('click', () => {
        restartGame();
    });
    
    // ============ ОСНОВНАЯ АНИМАЦИЯ ============
    function animate() {
        if (!gameRunning) {
            document.getElementById('finalScore').innerText = Math.floor(score);
            document.getElementById('finalCoins').innerText = coinsCollected;
            document.getElementById('gameOver').style.display = 'block';
            return;
        }
        
        updatePlayer();
        updateCoins();
        updateEnemies();
        updateCamera();
        drawUI();
        
        // Отрисовка
        drawBackground();
        drawPlatforms();
        drawEnemies();
        drawCoins();
        drawPlayer();
        
        animFrame = requestAnimationFrame(animate);
    }
    
    // Создание уровня и запуск
    createLevel();
    drawUI();
    animate();
</script>
</body>
</html>
