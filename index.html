<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CS:Lite — Тактический шутер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { font-family: 'Courier New', monospace; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .game-container { background: rgba(0,0,0,0.8); border-radius: 20px; padding: 20px; border: 1px solid #ffd700; }
        .hud { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.7); border-radius: 10px; padding: 15px; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .health-bar { width: 200px; height: 20px; background: #333; border-radius: 10px; overflow: hidden; position: relative; }
        .health-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #0f0, #ff0, #f00); border-radius: 10px; transition: width 0.3s; }
        .health-bar span { position: absolute; left: 50%; transform: translateX(-50%); font-size: 12px; color: white; }
        .ammo, .money, .round, .score { background: #111; padding: 5px 15px; border-radius: 5px; font-size: 18px; }
        .weapon-selector { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: linear-gradient(135deg,#1a1a2e,#0f0f23); border: 2px solid #ffd700; border-radius: 20px; padding: 30px; text-align: center; z-index: 100; }
        .weapon-title { font-size: 28px; font-weight: bold; color: #ffd700; margin-bottom: 20px; }
        .weapon-list { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .weapon-btn { background: linear-gradient(135deg,#2c3e50,#1a252f); border: 1px solid #ffd700; color: white; padding: 12px 25px; cursor: pointer; border-radius: 10px; font-family: monospace; }
        .weapon-btn:hover { background: linear-gradient(135deg,#ffd700,#ffaa00); color: #000; }
        canvas { border-radius: 10px; cursor: crosshair; background: #2d2d2d; display: block; margin: 0 auto; }
        .controls-hint { text-align: center; margin-top: 10px; font-size: 12px; color: #ffd700; }
        .round-info { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: linear-gradient(135deg,#1a1a2e,#0f0f23); border: 2px solid #ffd700; border-radius: 20px; padding: 30px; text-align: center; z-index: 100; }
        .round-title { font-size: 32px; font-weight: bold; color: #ffd700; margin-bottom: 15px; }
        .start-btn { background: linear-gradient(135deg,#ffd700,#ffaa00); border: none; padding: 12px 30px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; }
        .game-over { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: linear-gradient(135deg,#1a1a2e,#0f0f23); border: 2px solid #f44; border-radius: 20px; padding: 40px; text-align: center; z-index: 100; }
        .game-over-title { font-size: 36px; font-weight: bold; margin-bottom: 20px; }
        .game-over-title.win { color: #0f0; }
        .game-over-title.lose { color: #f44; }
        .restart-btn { background: linear-gradient(135deg,#ffd700,#ffaa00); border: none; padding: 12px 30px; font-size: 18px; border-radius: 10px; cursor: pointer; }
        @media (max-width: 1300px) { canvas { width: 100%; height: auto; } }
    </style>
</head>
<body>
<div class="game-container">
    <div class="hud">
        <div class="health-bar"><div class="health-fill" id="healthFill"></div><span id="healthText">100 HP</span></div>
        <div class="ammo"><span id="ammoText">30/90</span></div>
        <div class="money">💰 <span id="moneyText">800</span>$</div>
        <div class="round">Раунд <span id="roundText">1</span>/5</div>
        <div class="score">🏆 <span id="scoreText">0</span> : <span id="enemyScoreText">0</span></div>
    </div>

    <div class="weapon-selector" id="weaponSelector">
        <div class="weapon-title">ВЫБЕРИТЕ ОРУЖИЕ</div>
        <div class="weapon-list">
            <button class="weapon-btn" data-weapon="pistol">🔫 P250 (300$)</button>
            <button class="weapon-btn" data-weapon="rifle">🔫 AK-47 (2700$)</button>
            <button class="weapon-btn" data-weapon="sniper">🔫 AWP (4750$)</button>
            <button class="weapon-btn" data-weapon="shotgun">🔫 XM1014 (2000$)</button>
        </div>
    </div>

    <canvas id="gameCanvas" width="1100" height="550"></canvas>
    <div class="controls-hint">🖱️ Наведите прицел и кликните, чтобы выстрелить</div>

    <div class="round-info" id="roundInfo" style="display: none;">
        <div class="round-title" id="roundTitle">РАУНД НАЧАЛСЯ!</div>
        <div class="round-desc" id="roundDesc"></div>
        <button class="start-btn" id="startRoundBtn">НАЧАТЬ РАУНД</button>
    </div>

    <div class="game-over" id="gameOver" style="display: none;">
        <div class="game-over-title" id="gameOverTitle"></div>
        <button class="restart-btn" id="restartBtn">ИГРАТЬ СНОВА</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const weapons = {
        pistol: { name: 'P250', damage: 25, fireRate: 400, price: 300, magSize: 13, maxAmmo: 52 },
        rifle: { name: 'AK-47', damage: 40, fireRate: 600, price: 2700, magSize: 30, maxAmmo: 90 },
        sniper: { name: 'AWP', damage: 100, fireRate: 48, price: 4750, magSize: 10, maxAmmo: 30 },
        shotgun: { name: 'XM1014', damage: 70, fireRate: 120, price: 2000, magSize: 7, maxAmmo: 28 }
    };

    let gameState = {
        health: 100, money: 800, currentWeapon: null, ammo: 30, reserveAmmo: 90,
        score: 0, enemyScore: 0, round: 1, alive: true, gameActive: false, enemies: []
    };

    let mouseX = canvas.width/2, mouseY = canvas.height/2;

    function updateHUD() {
        document.getElementById('healthFill').style.width = `${Math.max(0, gameState.health)}%`;
        document.getElementById('healthText').innerHTML = `${Math.max(0, gameState.health)} HP`;
        document.getElementById('ammoText').innerHTML = `${gameState.ammo}/${gameState.reserveAmmo}`;
        document.getElementById('moneyText').innerHTML = gameState.money;
        document.getElementById('roundText').innerHTML = gameState.round;
        document.getElementById('scoreText').innerHTML = `${gameState.score} : ${gameState.enemyScore}`;
    }

    function spawnEnemies() {
        let count = 3 + Math.floor(Math.random() * 3);
        gameState.enemies = [];
        for (let i = 0; i < count; i++) {
            let x = 100 + Math.random() * (canvas.width - 200);
            let y = 80 + Math.random() * (canvas.height - 160);
            gameState.enemies.push({ x, y, health: 100, size: 30 });
        }
    }

    function draw() {
        ctx.fillStyle = '#3a3a3a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#8B6914';
        ctx.fillRect(180, 150, 80, 200);
        ctx.fillRect(850, 280, 80, 200);
        ctx.fillStyle = '#4169E1';
        ctx.fillRect(450, 80, 70, 120);
        ctx.fillRect(680, 380, 70, 120);

        gameState.enemies.forEach(e => {
            ctx.fillStyle = '#8B0000';
            ctx.fillRect(e.x - 15, e.y - 20, 30, 40);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 16px monospace';
            ctx.fillText('☠', e.x - 8, e.y - 5);
            ctx.fillStyle = '#0f0';
            ctx.fillRect(e.x - 15, e.y - 30, 30 * (e.health / 100), 5);
            ctx.fillStyle = '#f00';
            ctx.fillRect(e.x - 15 + 30 * (e.health / 100), e.y - 30, 30 * (1 - e.health / 100), 5);
        });

        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(mouseX-15, mouseY); ctx.lineTo(mouseX-5, mouseY);
        ctx.moveTo(mouseX+5, mouseY); ctx.lineTo(mouseX+15, mouseY);
        ctx.moveTo(mouseX, mouseY-15); ctx.lineTo(mouseX, mouseY-5);
        ctx.moveTo(mouseX, mouseY+5); ctx.lineTo(mouseX, mouseY+15);
        ctx.stroke();
        ctx.beginPath(); ctx.arc(mouseX, mouseY, 8, 0, 2*Math.PI); ctx.stroke();
    }

    function shoot() {
        if (!gameState.alive || !gameState.gameActive) return;
        if (gameState.ammo <= 0) {
            let weapon = weapons[gameState.currentWeapon];
            if (gameState.reserveAmmo > 0) {
                let needed = weapon.magSize - gameState.ammo;
                let take = Math.min(needed, gameState.reserveAmmo);
                gameState.ammo += take;
                gameState.reserveAmmo -= take;
                updateHUD();
            }
            return;
        }
        for (let i = 0; i < gameState.enemies.length; i++) {
            let e = gameState.enemies[i];
            let dx = mouseX - e.x, dy = mouseY - e.y;
            if (Math.sqrt(dx*dx + dy*dy) < 40) {
                e.health -= weapons[gameState.currentWeapon].damage;
                if (e.health <= 0) {
                    gameState.enemies.splice(i,1);
                    gameState.money += 300;
                    updateHUD();
                    i--;
                }
                break;
            }
        }
        gameState.ammo--;
        updateHUD();
        if (gameState.enemies.length === 0) winRound();
    }

    function winRound() {
        gameState.gameActive = false;
        gameState.score++;
        gameState.money += 800;
        updateHUD();
        document.getElementById('roundTitle').innerHTML = 'РАУНД ВЫИГРАН!';
        document.getElementById('roundDesc').innerHTML = `Вы +800$ | Счёт: ${gameState.score} : ${gameState.enemyScore}`;
        document.getElementById('roundInfo').style.display = 'block';
    }

    function loseRound() {
        gameState.gameActive = false;
        gameState.enemyScore++;
        updateHUD();
        document.getElementById('roundTitle').innerHTML = 'ВЫ ПОГИБЛИ';
        document.getElementById('roundDesc').innerHTML = `Счёт: ${gameState.score} : ${gameState.enemyScore}`;
        document.getElementById('roundInfo').style.display = 'block';
    }

    function startRound() {
        document.getElementById('roundInfo').style.display = 'none';
        gameState.alive = true;
        gameState.health = 100;
        gameState.gameActive = true;
        updateHUD();
        spawnEnemies();
        if (gameState.round > 5) endGame();
    }

    function endGame() {
        gameState.gameActive = false;
        let isWin = gameState.score > gameState.enemyScore;
        document.getElementById('gameOver').style.display = 'block';
        document.getElementById('gameOverTitle').innerHTML = isWin ? 'ПОБЕДА!' : 'ПОРАЖЕНИЕ!';
        document.getElementById('gameOverTitle').className = isWin ? 'game-over-title win' : 'game-over-title lose';
    }

    function restartGame() {
        gameState = { health:100, money:800, currentWeapon:null, ammo:30, reserveAmmo:90, score:0, enemyScore:0, round:1, alive:true, gameActive:false, enemies:[] };
        document.getElementById('gameOver').style.display = 'none';
        document.getElementById('weaponSelector').style.display = 'flex';
        updateHUD();
    }

    document.querySelectorAll('.weapon-btn').forEach(btn => {
        btn.onclick = () => {
            let w = weapons[btn.dataset.weapon];
            if (gameState.money >= w.price) {
                gameState.money -= w.price;
                gameState.currentWeapon = btn.dataset.weapon;
                gameState.ammo = w.magSize;
                gameState.reserveAmmo = w.maxAmmo;
                document.getElementById('weaponSelector').style.display = 'none';
                updateHUD();
                startRound();
            } else alert(`Недостаточно денег! Нужно ${w.price}$`);
        };
    });

    canvas.onmousemove = (e) => {
        let rect = canvas.getBoundingClientRect();
        let scaleX = canvas.width / rect.width;
        let scaleY = canvas.height / rect.height;
        mouseX = (e.clientX - rect.left) * scaleX;
        mouseY = (e.clientY - rect.top) * scaleY;
        mouseX = Math.min(Math.max(mouseX, 0), canvas.width);
        mouseY = Math.min(Math.max(mouseY, 0), canvas.height);
    };
    canvas.onclick = () => shoot();
    document.getElementById('startRoundBtn').onclick = () => { gameState.round++; updateHUD(); startRound(); };
    document.getElementById('restartBtn').onclick = restartGame;

    function animate() { draw(); requestAnimationFrame(animate); }
    animate();
    updateHUD();
</script>
</body>
</html>
