<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CS:Lite 2.0 - Псевдо-3D Шутер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0f1a 0%, #1a1f2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Courier New', monospace;
        }

        .game-container {
            background: rgba(0, 0, 0, 0.85);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            border: 1px solid #ffd700;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            padding: 10px 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .health-bar {
            width: 250px;
            height: 20px;
            background: #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
        }

        .health-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #00cc00, #ffcc00, #ff3300);
            transition: width 0.3s;
        }

        .ammo, .money, .round, .score, .weapon-name {
            background: #1a1a2a;
            padding: 5px 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid #ffd700;
        }

        .shop-btn {
            background: linear-gradient(135deg, #2c3e50, #1a252f);
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 5px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .shop-btn:hover {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
        }

        canvas {
            border-radius: 12px;
            cursor: crosshair;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            display: block;
            margin: 0 auto;
        }

        .controls-hint {
            text-align: center;
            margin-top: 12px;
            font-size: 11px;
            color: #ffd700;
        }

        .shop-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1a1a2e, #0d0d1a);
            border: 2px solid #ffd700;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            z-index: 100;
            width: 400px;
        }

        .shop-title {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 20px;
        }

        .shop-items {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .shop-item {
            background: #2a2a3a;
            border: 1px solid #ffd700;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.2s;
        }

        .shop-item:hover {
            background: #3a3a4a;
            transform: scale(1.02);
        }

        .shop-item-name { font-weight: bold; color: #ffd700; }
        .shop-item-price { color: #00ff00; }
        .shop-item-desc { font-size: 11px; color: #aaa; }

        .close-shop {
            background: #ff4444;
            border: none;
            padding: 8px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1a1a2e, #0d0d1a);
            border: 2px solid #ff4444;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            z-index: 100;
        }

        .game-over-title { font-size: 36px; font-weight: bold; margin-bottom: 20px; }
        .game-over-title.win { color: #00ff00; }
        .game-over-title.lose { color: #ff4444; }
        .restart-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
        }

        @media (max-width: 1000px) {
            canvas { width: 100%; height: auto; }
            .shop-panel { width: 90%; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="hud">
        <div class="health-bar"><div class="health-fill" id="healthFill"></div></div>
        <div class="weapon-name" id="weaponName">P250</div>
        <div class="ammo"><span id="ammoText">13/52</span></div>
        <div class="money">💰 <span id="moneyText">800</span>$</div>
        <div class="round">Раунд <span id="roundText">1</span>/5</div>
        <div class="score">🏆 <span id="scoreText">0</span> : <span id="enemyScoreText">0</span></div>
        <button class="shop-btn" id="shopBtn">🛒 МАГАЗИН</button>
    </div>

    <canvas id="gameCanvas" width="900" height="600"></canvas>
    <div class="controls-hint">🎮 W/A/S/D — движение | 🖱️ Мышь — прицел | 🔫 ЛКМ — выстрел | 🔄 R — перезарядка</div>

    <div class="shop-panel" id="shopPanel" style="display: none;">
        <div class="shop-title">🛒 ОРУЖЕЙНЫЙ МАГАЗИН</div>
        <div class="shop-items">
            <div class="shop-item" data-weapon="pistol">
                <div><span class="shop-item-name">🔫 P250</span><br><span class="shop-item-desc">Урон: 25 | Магазин: 13</span></div>
                <div class="shop-item-price">300$</div>
            </div>
            <div class="shop-item" data-weapon="rifle">
                <div><span class="shop-item-name">🔫 AK-47</span><br><span class="shop-item-desc">Урон: 40 | Магазин: 30</span></div>
                <div class="shop-item-price">2700$</div>
            </div>
            <div class="shop-item" data-weapon="sniper">
                <div><span class="shop-item-name">🔫 AWP</span><br><span class="shop-item-desc">Урон: 100 | Магазин: 10</span></div>
                <div class="shop-item-price">4750$</div>
            </div>
            <div class="shop-item" data-weapon="shotgun">
                <div><span class="shop-item-name">🔫 XM1014</span><br><span class="shop-item-desc">Урон: 70 | Магазин: 7</span></div>
                <div class="shop-item-price">2000$</div>
            </div>
        </div>
        <button class="close-shop" id="closeShopBtn">ЗАКРЫТЬ</button>
    </div>

    <div class="game-over" id="gameOver" style="display: none;">
        <div class="game-over-title" id="gameOverTitle"></div>
        <button class="restart-btn" id="restartBtn">ИГРАТЬ СНОВА</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Оружие
    const weapons = {
        pistol: { name: 'P250', damage: 25, fireRate: 400, price: 300, magSize: 13, maxAmmo: 52, color: '#8B6914' },
        rifle: { name: 'AK-47', damage: 40, fireRate: 600, price: 2700, magSize: 30, maxAmmo: 90, color: '#2a2a2a' },
        sniper: { name: 'AWP', damage: 100, fireRate: 48, price: 4750, magSize: 10, maxAmmo: 30, color: '#1a3a4a' },
        shotgun: { name: 'XM1014', damage: 70, fireRate: 120, price: 2000, magSize: 7, maxAmmo: 28, color: '#4a2a1a' }
    };

    let currentWeapon = 'pistol';
    let ammo = weapons.pistol.magSize;
    let reserveAmmo = weapons.pistol.maxAmmo;
    let money = 800;
    let health = 100;
    let score = 0;
    let enemyScore = 0;
    let round = 1;
    let alive = true;
    let gameActive = false;
    let reloading = false;
    let shootCooldown = 0;
    let lastShootTime = 0;

    // Игрок (позиция для псевдо-3D)
    let player = { x: 400, y: 300, angle: 0, fov: 70 };
    
    // Противники
    let enemies = [];
    
    // Карта (стены)
    let walls = [
        { x1: 100, y1: 100, x2: 800, y2: 100 }, // верх
        { x1: 100, y1: 500, x2: 800, y2: 500 }, // низ
        { x1: 100, y1: 100, x2: 100, y2: 500 }, // лево
        { x1: 800, y1: 100, x2: 800, y2: 500 }, // право
        { x1: 300, y1: 200, x2: 500, y2: 200 }, // стена в центре
        { x1: 500, y1: 200, x2: 500, y2: 400 },
        { x1: 300, y1: 400, x2: 500, y2: 400 }
    ];

    function updateHUD() {
        document.getElementById('healthFill').style.width = `${Math.max(0, health)}%`;
        document.getElementById('weaponName').innerHTML = weapons[currentWeapon].name;
        document.getElementById('ammoText').innerHTML = `${ammo}/${reserveAmmo}`;
        document.getElementById('moneyText').innerHTML = money;
        document.getElementById('roundText').innerHTML = round;
        document.getElementById('scoreText').innerHTML = `${score} : ${enemyScore}`;
    }

    function spawnEnemies() {
        enemies = [];
        let count = 2 + Math.floor(Math.random() * 3) + Math.floor(round / 2);
        for (let i = 0; i < count; i++) {
            let side = Math.random() > 0.5 ? 'left' : 'right';
            let x = side === 'left' ? 50 + Math.random() * 200 : 700 + Math.random() * 150;
            let y = 100 + Math.random() * 350;
            enemies.push({ x, y, health: 100, damage: 10, type: 'normal', lastShoot: 0 });
        }
    }

    function checkCollision(x, y) {
        for (let wall of walls) {
            if (x > wall.x1 - 15 && x < wall.x2 + 15 && y > wall.y1 - 15 && y < wall.y2 + 15) return true;
        }
        return false;
    }

    function moveEnemies() {
        for (let i = 0; i < enemies.length; i++) {
            let e = enemies[i];
            let dx = player.x - e.x;
            let dy = player.y - e.y;
            let dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > 10) {
                let moveX = (dx / dist) * 1.5;
                let moveY = (dy / dist) * 1.5;
                let newX = e.x + moveX;
                let newY = e.y + moveY;
                if (!checkCollision(newX, e.y)) e.x = newX;
                if (!checkCollision(e.x, newY)) e.y = newY;
            }
            
            // Стрельба врагов
            if (dist < 120 && Date.now() - e.lastShoot > 1000) {
                e.lastShoot = Date.now();
                if (gameActive && alive) {
                    health -= e.damage;
                    updateHUD();
                    if (health <= 0) {
                        health = 0;
                        alive = false;
                        gameActive = false;
                        loseRound();
                    }
                }
            }
        }
    }

    function shoot() {
        if (!gameActive || !alive || reloading) return;
        if (Date.now() - lastShootTime < 1000 / weapons[currentWeapon].fireRate) return;
        if (ammo <= 0) {
            reload();
            return;
        }
        
        lastShootTime = Date.now();
        ammo--;
        updateHUD();
        
        // Анимация выстрела
        ctx.fillStyle = '#ffff00';
        ctx.beginPath();
        ctx.arc(canvas.width/2, canvas.height/2, 20, 0, 2 * Math.PI);
        ctx.fill();
        
        // Проверка попадания
        let centerX = canvas.width / 2;
        let centerY = canvas.height / 2;
        let closest = null;
        let closestDist = 50;
        
        for (let i = 0; i < enemies.length; i++) {
            let e = enemies[i];
            let screenX = (e.x - player.x) * Math.cos(-player.angle) - (e.y - player.y) * Math.sin(-player.angle);
            let screenY = (e.x - player.x) * Math.sin(-player.angle) + (e.y - player.y) * Math.cos(-player.angle);
            let screenXproj = canvas.width/2 + (screenX / screenY) * 300;
            let screenYproj = canvas.height/2 + (0 / screenY) * 200;
            
            let distToCenter = Math.abs(screenXproj - centerX);
            if (screenY > 0 && distToCenter < closestDist && distToCenter < 40) {
                closestDist = distToCenter;
                closest = i;
            }
        }
        
        if (closest !== null) {
            let e = enemies[closest];
            let damage = weapons[currentWeapon].damage;
            e.health -= damage;
            
            // Эффект попадания
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, 15, 0, 2 * Math.PI);
            ctx.fill();
            
            if (e.health <= 0) {
                enemies.splice(closest, 1);
                money += 300;
                updateHUD();
            }
        }
        
        if (enemies.length === 0 && gameActive) {
            winRound();
        }
    }

    function reload() {
        if (reloading || ammo === weapons[currentWeapon].magSize) return;
        reloading = true;
        setTimeout(() => {
            let needed = weapons[currentWeapon].magSize - ammo;
            let take = Math.min(needed, reserveAmmo);
            ammo += take;
            reserveAmmo -= take;
            reloading = false;
            updateHUD();
        }, 1500);
    }

    function winRound() {
        gameActive = false;
        score++;
        money += 800;
        updateHUD();
        if (round >= 5) {
            endGame();
        } else {
            round++;
            updateHUD();
            setTimeout(() => {
                health = 100;
                alive = true;
                gameActive = true;
                spawnEnemies();
                updateHUD();
            }, 2000);
        }
    }

    function loseRound() {
        gameActive = false;
        enemyScore++;
        updateHUD();
        if (round >= 5) {
            endGame();
        } else {
            round++;
            setTimeout(() => {
                health = 100;
                alive = true;
                gameActive = true;
                spawnEnemies();
                updateHUD();
            }, 2000);
        }
    }

    function endGame() {
        gameActive = false;
        let isWin = score > enemyScore;
        document.getElementById('gameOver').style.display = 'block';
        document.getElementById('gameOverTitle').innerHTML = isWin ? 'ПОБЕДА!' : 'ПОРАЖЕНИЕ!';
        document.getElementById('gameOverTitle').className = isWin ? 'game-over-title win' : 'game-over-title lose';
    }

    function restartGame() {
        health = 100;
        money = 800;
        score = 0;
        enemyScore = 0;
        round = 1;
        currentWeapon = 'pistol';
        ammo = weapons.pistol.magSize;
        reserveAmmo = weapons.pistol.maxAmmo;
        alive = true;
        gameActive = true;
        player.x = 400;
        player.y = 300;
        document.getElementById('gameOver').style.display = 'none';
        spawnEnemies();
        updateHUD();
    }

    // Управление
    const keys = {};
    document.addEventListener('keydown', (e) => {
        keys[e.key.toLowerCase()] = true;
        if (e.key === 'r' || e.key === 'R') reload();
        if (e.key === ' ' || e.key === 'Space') shoot();
    });
    document.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });
    
    canvas.addEventListener('click', shoot);
    
    canvas.addEventListener('mousemove', (e) => {
        let rect = canvas.getBoundingClientRect();
        let mouseX = (e.clientX - rect.left) / rect.width * canvas.width;
        let angle = (mouseX - canvas.width/2) / canvas.width * Math.PI;
        player.angle += angle * 0.05;
        player.angle = Math.min(Math.max(player.angle, -1.2), 1.2);
    });

    function movePlayer() {
        let speed = 3;
        let newX = player.x;
        let newY = player.y;
        if (keys['w']) { newX += Math.cos(player.angle) * speed; newY += Math.sin(player.angle) * speed; }
        if (keys['s']) { newX -= Math.cos(player.angle) * speed; newY -= Math.sin(player.angle) * speed; }
        if (keys['a']) { newX += Math.sin(player.angle) * speed; newY -= Math.cos(player.angle) * speed; }
        if (keys['d']) { newX -= Math.sin(player.angle) * speed; newY += Math.cos(player.angle) * speed; }
        if (!checkCollision(newX, player.y)) player.x = newX;
        if (!checkCollision(player.x, newY)) player.y = newY;
        player.x = Math.min(Math.max(player.x, 50), 850);
        player.y = Math.min(Math.max(player.y, 50), 550);
    }

    function draw3D() {
        ctx.fillStyle = '#1a1a2a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Пол
        ctx.fillStyle = '#2a2a3a';
        ctx.fillRect(0, canvas.height/2, canvas.width, canvas.height/2);
        ctx.fillStyle = '#3a3a4a';
        for (let i = 0; i < canvas.width; i += 50) {
            ctx.fillRect(i, canvas.height/2, 2, canvas.height/2);
        }
        
        // Враги (3D проекция)
        for (let e of enemies) {
            let dx = e.x - player.x;
            let dy = e.y - player.y;
            let dist = Math.sqrt(dx * dx + dy * dy);
            let angleToEnemy = Math.atan2(dy, dx);
            let relativeAngle = angleToEnemy - player.angle;
            let screenX = canvas.width/2 + (relativeAngle / player.fov) * canvas.width;
            let size = Math.min(300, 2000 / dist);
            let screenY = canvas.height/2 - size/2;
            
            if (Math.abs(relativeAngle) < 0.8 && dist > 0) {
                ctx.fillStyle = '#8B0000';
                ctx.fillRect(screenX - size/3, screenY, size/1.5, size);
                ctx.fillStyle = '#d4a574';
                ctx.fillRect(screenX - size/4, screenY - size/4, size/2, size/4);
                ctx.fillStyle = '#fff';
                ctx.fillRect(screenX - size/6, screenY + size/4, size/3, size/6);
                
                // Полоска здоровья
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(screenX - size/3, screenY - 15, size * 1.5 * (e.health/100), 5);
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(screenX - size/3 + size * 1.5 * (e.health/100), screenY - 15, size * 1.5 * (1 - e.health/100), 5);
            }
        }
        
        // Прицел
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        let cx = canvas.width/2, cy = canvas.height/2;
        ctx.beginPath();
        ctx.moveTo(cx-15, cy); ctx.lineTo(cx-5, cy);
        ctx.moveTo(cx+5, cy); ctx.lineTo(cx+15, cy);
        ctx.moveTo(cx, cy-15); ctx.lineTo(cx, cy-5);
        ctx.moveTo(cx, cy+5); ctx.lineTo(cx, cy+15);
        ctx.stroke();
        ctx.beginPath(); ctx.arc(cx, cy, 8, 0, 2*Math.PI); ctx.stroke();
        
        // Индикатор перезарядки
        if (reloading) {
            ctx.fillStyle = 'rgba(255, 100, 0, 0.8)';
            ctx.font = 'bold 20px monospace';
            ctx.fillText('ПЕРЕЗАРЯДКА...', cx-80, cy-50);
        }
    }

    // Магазин
    document.getElementById('shopBtn').onclick = () => {
        if (!gameActive) return;
        document.getElementById('shopPanel').style.display = 'block';
        gameActive = false;
    };
    document.getElementById('closeShopBtn').onclick = () => {
        document.getElementById('shopPanel').style.display = 'none';
        gameActive = true;
    };
    document.querySelectorAll('.shop-item').forEach(item => {
        item.onclick = () => {
            let weapon = item.dataset.weapon;
            let w = weapons[weapon];
            if (money >= w.price) {
                money -= w.price;
                currentWeapon = weapon;
                ammo = w.magSize;
                reserveAmmo = w.maxAmmo;
                updateHUD();
                document.getElementById('shopPanel').style.display = 'none';
                gameActive = true;
            } else {
                alert(`Недостаточно денег! Нужно ${w.price}$`);
            }
        };
    });
    
    document.getElementById('restartBtn').onclick = restartGame;

    // Game loop
    function gameLoop() {
        if (gameActive && alive) {
            movePlayer();
            moveEnemies();
            draw3D();
        } else {
            draw3D();
        }
        requestAnimationFrame(gameLoop);
    }
    
    spawnEnemies();
    gameActive = true;
    alive = true;
    updateHUD();
    gameLoop();
</script>
</body>
</html>
