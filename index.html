<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PLATFORMER ADVENTURE — Мир Марио | Несколько уровней</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f2a 0%, #1a1f4a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
        }
        
        .game-container {
            position: relative;
            background: #000;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 12px;
            cursor: pointer;
        }
        
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid #ffd700;
            color: #ffd700;
            font-weight: bold;
            z-index: 10;
            font-size: 18px;
        }
        
        .score, .coins, .level {
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
        }
        
        .level-complete {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #000, #1a4a1a);
            border: 2px solid #00ff00;
            border-radius: 30px;
            padding: 30px 50px;
            text-align: center;
            z-index: 20;
            color: white;
            backdrop-filter: blur(10px);
        }
        
        .level-complete h2 {
            font-size: 36px;
            color: #00ff00;
            margin-bottom: 20px;
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #000, #1a0a0a);
            border: 2px solid #ff3300;
            border-radius: 30px;
            padding: 30px 50px;
            text-align: center;
            z-index: 20;
            color: white;
            backdrop-filter: blur(10px);
        }
        
        .game-over h2 {
            font-size: 36px;
            color: #ff3300;
            margin-bottom: 20px;
        }
        
        .restart-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border: none;
            padding: 10px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.2s;
        }
        
        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }
        
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 20px;
            color: #ffd700;
            font-size: 12px;
            z-index: 10;
        }
        
        @media (max-width: 900px) {
            .hud { font-size: 12px; padding: 6px 12px; }
            .game-over h2 { font-size: 24px; }
            .game-over { padding: 20px 30px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="1000" height="550"></canvas>
    
    <div class="hud">
        <div class="score">⭐ СЧЁТ: <span id="scoreValue">0</span></div>
        <div class="coins">🪙 МОНЕТЫ: <span id="coinsValue">0</span></div>
        <div class="level">🏆 УРОВЕНЬ: <span id="levelValue">1</span></div>
    </div>
    
    <div class="controls">
        🎮 A/D или ←/→ — движение | ПРОБЕЛ или ↑ — прыжок
    </div>
    
    <div class="level-complete" id="levelComplete" style="display: none;">
        <h2>🌟 УРОВЕНЬ ПРОЙДЕН! 🌟</h2>
        <div style="font-size: 18px; margin: 10px 0;">Собираем монеты для перехода...</div>
        <div style="font-size: 16px; margin-bottom: 15px;">Монет собрано: <span id="levelCoins">0</span> / <span id="levelNeed">0</span></div>
        <button class="restart-btn" id="nextLevelBtn">➡️ СЛЕДУЮЩИЙ УРОВЕНЬ</button>
    </div>
    
    <div class="game-over" id="gameOver" style="display: none;">
        <h2>💀 GAME OVER 💀</h2>
        <div style="font-size: 18px; margin: 10px 0;">Ваш счёт: <span id="finalScore">0</span></div>
        <div style="font-size: 14px; margin-bottom: 15px;">Монет собрано: <span id="finalCoins">0</span></div>
        <button class="restart-btn" id="restartBtn">🔄 ИГРАТЬ СНОВА</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const GRAVITY = 0.5;
    const JUMP_POWER = -9;
    
    let cameraX = 0;
    let currentLevel = 1;
    let totalScore = 0;
    let globalCoins = 0;
    let coinsForNextLevel = 0;
    
    // ============ УРОВНИ ============
    const levels = [
        {   // Уровень 1
            width: 3000,
            groundY: 520,
            requiredCoins: 8,
            platforms: [
                { x: 200, y: 470, w: 80, h: 20 },
                { x: 350, y: 430, w: 70, h: 20 },
                { x: 500, y: 470, w: 100, h: 20 },
                { x: 680, y: 420, w: 60, h: 20 },
                { x: 800, y: 380, w: 70, h: 20 },
                { x: 950, y: 440, w: 80, h: 20 },
                { x: 1100, y: 390, w: 65, h: 20 },
                { x: 1250, y: 460, w: 90, h: 20 },
                { x: 1400, y: 410, w: 70, h: 20 },
                { x: 1550, y: 360, w: 60, h: 20 },
                { x: 1680, y: 430, w: 80, h: 20 },
                { x: 1850, y: 480, w: 100, h: 20 },
                { x: 2000, y: 400, w: 70, h: 20 },
                { x: 2150, y: 350, w: 65, h: 20 },
                { x: 2300, y: 420, w: 80, h: 20 },
                { x: 2450, y: 370, w: 70, h: 20 },
                { x: 2600, y: 450, w: 90, h: 20 },
                { x: 2750, y: 390, w: 65, h: 20 },
                { x: 2900, y: 350, w: 60, h: 20 }
            ],
            coins: [
                [220, 440], [370, 400], [520, 440], [700, 390], [820, 350],
                [970, 410], [1120, 360], [1270, 430], [1420, 380], [1570, 330],
                [1700, 400], [1880, 450], [2020, 370], [2170, 320], [2320, 390],
                [2470, 340], [2630, 420], [2770, 360], [2920, 320]
            ],
            enemies: [
                { x: 400, y: 455, type: 'snail', direction: 1, range: 100 },
                { x: 750, y: 405, type: 'snail', direction: -1, range: 100 },
                { x: 1050, y: 425, type: 'bird', direction: 1, range: 120, flyY: 380, flyRange: 30 },
                { x: 1350, y: 445, type: 'snail', direction: -1, range: 120 },
                { x: 1650, y: 325, type: 'bird', direction: 1, range: 90, flyY: 325, flyRange: 40 },
                { x: 1950, y: 465, type: 'snail', direction: -1, range: 100 },
                { x: 2250, y: 315, type: 'bird', direction: 1, range: 80, flyY: 315, flyRange: 35 },
                { x: 2550, y: 435, type: 'snail', direction: -1, range: 100 }
            ]
        },
        {   // Уровень 2 (более сложный)
            width: 3200,
            groundY: 520,
            requiredCoins: 12,
            platforms: [
                { x: 150, y: 470, w: 70, h: 20 }, { x: 300, y: 430, w: 60, h: 20 },
                { x: 450, y: 480, w: 90, h: 20 }, { x: 600, y: 400, w: 70, h: 20 },
                { x: 750, y: 450, w: 65, h: 20 }, { x: 900, y: 380, w: 80, h: 20 },
                { x: 1050, y: 420, w: 70, h: 20 }, { x: 1200, y: 360, w: 60, h: 20 },
                { x: 1350, y: 440, w: 85, h: 20 }, { x: 1500, y: 390, w: 70, h: 20 },
                { x: 1650, y: 340, w: 65, h: 20 }, { x: 1800, y: 460, w: 80, h: 20 },
                { x: 1950, y: 410, w: 75, h: 20 }, { x: 2100, y: 370, w: 60, h: 20 },
                { x: 2250, y: 430, w: 70, h: 20 }, { x: 2400, y: 350, w: 65, h: 20 },
                { x: 2550, y: 400, w: 80, h: 20 }, { x: 2700, y: 360, w: 70, h: 20 },
                { x: 2850, y: 450, w: 90, h: 20 }, { x: 3000, y: 390, w: 70, h: 20 }
            ],
            coins: [
                [170, 440], [320, 400], [480, 450], [620, 370], [770, 420],
                [920, 350], [1070, 390], [1220, 330], [1370, 410], [1520, 360],
                [1670, 310], [1820, 430], [1970, 380], [2120, 340], [2270, 400],
                [2420, 320], [2570, 370], [2720, 330], [2870, 420], [3020, 360]
            ],
            enemies: [
                { x: 250, y: 455, type: 'bird', direction: 1, range: 120, flyY: 400, flyRange: 50 },
                { x: 550, y: 465, type: 'snail', direction: -1, range: 130 },
                { x: 850, y: 405, type: 'bird', direction: 1, range: 100, flyY: 360, flyRange: 40 },
                { x: 1150, y: 445, type: 'snail', direction: 1, range: 110 },
                { x: 1450, y: 375, type: 'bird', direction: -1, range: 90, flyY: 375, flyRange: 45 },
                { x: 1750, y: 325, type: 'bird', direction: 1, range: 100, flyY: 325, flyRange: 35 },
                { x: 2050, y: 445, type: 'snail', direction: -1, range: 120 },
                { x: 2350, y: 395, type: 'bird', direction: 1, range: 80, flyY: 395, flyRange: 30 },
                { x: 2650, y: 435, type: 'snail', direction: 1, range: 110 },
                { x: 2950, y: 385, type: 'bird', direction: -1, range: 90, flyY: 385, flyRange: 40 }
            ]
        }
    ];
    
    let platforms = [];
    let coins = [];
    let enemies = [];
    let levelWidth = 0;
    let requiredCoins = 0;
    
    // Игрок
    let player = {
        x: 100, y: 450, vx: 0, vy: 0, width: 30, height: 35,
        onGround: true, facingRight: true
    };
    
    let gameRunning = true;
    let levelCoinsCollected = 0;
    let levelCompleted = false;
    let animFrame;
    
    const keys = { left: false, right: false, jump: false };
    let canJump = true;
    
    // ============ ЗАГРУЗКА УРОВНЯ ============
    function loadLevel(levelNum) {
        const level = levels[levelNum - 1];
        levelWidth = level.width;
        requiredCoins = level.requiredCoins;
        
        // Очистка
        platforms = [];
        coins = [];
        enemies = [];
        
        // Добавляем землю
        platforms.push({ x: 0, y: level.groundY, width: levelWidth, height: 30, color: '#5a3a1a' });
        
        // Платформы
        level.platforms.forEach(p => {
            platforms.push({ x: p.x, y: p.y, width: p.w, height: p.h, color: '#8B5A2B' });
        });
        
        // Монеты
        level.coins.forEach(pos => {
            coins.push({ x: pos[0], y: pos[1], width: 12, height: 12, collected: false });
        });
        
        // Враги
        level.enemies.forEach(e => {
            enemies.push({
                x: e.x, y: e.y, width: 28, height: 28,
                type: e.type,
                direction: e.direction,
                startX: e.x,
                range: e.range,
                flyY: e.flyY || e.y,
                flyRange: e.flyRange || 0,
                flyOffset: Math.random() * Math.PI * 2,
                alive: true
            });
        });
        
        // Сброс игрока
        player = {
            x: 100, y: level.groundY - 35, vx: 0, vy: 0, width: 30, height: 35,
            onGround: true, facingRight: true
        };
        cameraX = 0;
        levelCoinsCollected = 0;
        levelCompleted = false;
        gameRunning = true;
        
        document.getElementById('levelValue').innerText = levelNum;
        updateUI();
    }
    
    function updateUI() {
        document.getElementById('scoreValue').innerText = totalScore + levelCoinsCollected * 10;
        document.getElementById('coinsValue').innerText = globalCoins + levelCoinsCollected;
    }
    
    // ============ РИСОВАНИЕ ============
    function drawBackground() {
        const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, '#1a2a4a');
        grad.addColorStop(1, '#4a6a8a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Облака
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        const cloudX = (cameraX * 0.3) % 400;
        for (let i = -200; i < canvas.width + 200; i += 200) {
            ctx.beginPath();
            ctx.ellipse(cloudX + i, 70, 40, 30, 0, 0, Math.PI * 2);
            ctx.ellipse(cloudX + i + 40, 60, 35, 28, 0, 0, Math.PI * 2);
            ctx.ellipse(cloudX + i - 30, 65, 35, 28, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        
        ctx.fillStyle = '#ffdd77';
        ctx.shadowBlur = 30;
        ctx.shadowColor = '#ffaa33';
        ctx.beginPath();
        ctx.arc(canvas.width - 60, 60, 40, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
    
    function drawPlatforms() {
        for (let p of platforms) {
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(p.x - cameraX, p.y + 3, p.width, p.height);
            
            const grad = ctx.createLinearGradient(p.x - cameraX, p.y, p.x - cameraX, p.y + p.height);
            grad.addColorStop(0, '#9B5A2B');
            grad.addColorStop(1, '#6B3A1A');
            ctx.fillStyle = grad;
            ctx.fillRect(p.x - cameraX, p.y, p.width, p.height);
            
            ctx.fillStyle = '#D2A679';
            ctx.fillRect(p.x - cameraX + 5, p.y - 3, p.width - 10, 5);
        }
    }
    
    function drawPlayer() {
        const x = player.x - cameraX;
        const y = player.y;
        
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath();
        ctx.ellipse(x + 15, y + 32, 18, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        
        const legOffset = player.vx !== 0 ? Math.sin(Date.now() * 0.015) * 5 : 0;
        
        ctx.fillStyle = '#2255aa';
        ctx.fillRect(x + 5, y + 18, 8, 12);
        ctx.fillRect(x + 17, y + 18, 8, 12);
        
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(x + 5, y, 20, 28);
        ctx.fillStyle = '#ff6666';
        ctx.fillRect(x + 8, y + 5, 14, 12);
        
        ctx.fillStyle = '#ffcc99';
        ctx.beginPath();
        ctx.ellipse(x + 15, y - 5, 12, 14, 0, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = '#cc3333';
        ctx.fillRect(x + 3, y - 15, 24, 10);
        ctx.fillRect(x + 8, y - 22, 14, 10);
        
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(x + 10, y - 7, 2, 0, Math.PI * 2);
        ctx.arc(x + 20, y - 7, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(x + 9, y - 8, 0.8, 0, Math.PI * 2);
        ctx.arc(x + 19, y - 8, 0.8, 0, Math.PI * 2);
        ctx.fill();
        
        if (player.facingRight) {
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x + 22, y - 7, 2, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    
    function drawCoins() {
        for (let coin of coins) {
            if (coin.collected) continue;
            const x = coin.x - cameraX;
            const y = coin.y;
            const angle = Date.now() * 0.008;
            const scale = 1 + Math.sin(angle * 3) * 0.1;
            
            ctx.save();
            ctx.translate(x + 6, y + 6);
            ctx.scale(scale, scale);
            ctx.fillStyle = '#ffd700';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ffaa00';
            ctx.beginPath();
            ctx.ellipse(0, 0, 7, 7, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ffaa00';
            ctx.beginPath();
            ctx.ellipse(0, 0, 5, 5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 12px monospace';
            ctx.fillText('★', -4, 4);
            ctx.restore();
        }
        ctx.shadowBlur = 0;
    }
    
    function drawEnemies() {
        for (let enemy of enemies) {
            if (!enemy.alive) continue;
            const x = enemy.x - cameraX;
            const y = enemy.y;
            
            if (enemy.type === 'bird') {
                // Птица
                ctx.fillStyle = '#ff6633';
                ctx.beginPath();
                ctx.ellipse(x + 14, y + 14, 14, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffaa66';
                ctx.beginPath();
                ctx.ellipse(x + 8, y + 10, 4, 5, 0, 0, Math.PI * 2);
                ctx.ellipse(x + 20, y + 10, 4, 5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.fillRect(x + 6, y + 8, 3, 3);
                ctx.fillRect(x + 18, y + 8, 3, 3);
                ctx.fillStyle = '#ffaa00';
                ctx.beginPath();
                ctx.moveTo(x + 27, y + 14);
                ctx.lineTo(x + 32, y + 10);
                ctx.lineTo(x + 32, y + 18);
                ctx.fill();
            } else {
                // Улитка
                ctx.fillStyle = '#6a8a3a';
                ctx.fillRect(x, y + 15, 28, 10);
                ctx.beginPath();
                ctx.ellipse(x + 14, y + 12, 12, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#8aaa4a';
                ctx.beginPath();
                ctx.ellipse(x + 14, y + 8, 10, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.fillRect(x + 8, y + 6, 3, 3);
                ctx.fillRect(x + 18, y + 6, 3, 3);
                ctx.fillStyle = '#5a3a1a';
                ctx.beginPath();
                ctx.ellipse(x + 14, y + 4, 8, 4, 0, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }
    
    // ============ ФИЗИКА ============
    function updatePlayer() {
        player.vx = 0;
        if (keys.left) { player.vx = -5; player.facingRight = false; }
        if (keys.right) { player.vx = 5; player.facingRight = true; }
        
        player.x += player.vx;
        player.x = Math.max(20, Math.min(levelWidth - player.width - 20, player.x));
        
        player.vy += GRAVITY;
        player.y += player.vy;
        
        player.onGround = false;
        for (let p of platforms) {
            if (player.y + player.height > p.y && player.y < p.y + p.height &&
                player.x + player.width > p.x && player.x < p.x + p.width) {
                if (player.vy >= 0 && player.y + player.height - p.y <= 15) {
                    player.y = p.y - player.height;
                    player.vy = 0;
                    player.onGround = true;
                    canJump = true;
                } else if (player.vy < 0) {
                    player.y = p.y + p.height;
                    player.vy = 0;
                }
            }
        }
        
        if (player.y > canvas.height + 100) gameRunning = false;
        
        if (keys.jump && player.onGround && canJump) {
            player.vy = JUMP_POWER;
            player.onGround = false;
            canJump = false;
        }
        if (!keys.jump) canJump = true;
    }
    
    function updateEnemies() {
        for (let enemy of enemies) {
            if (!enemy.alive) continue;
            
            if (enemy.type === 'bird') {
                enemy.x += enemy.direction * 1.8;
                if (enemy.x > enemy.startX + enemy.range) { enemy.x = enemy.startX + enemy.range; enemy.direction = -1; }
                if (enemy.x < enemy.startX - enemy.range) { enemy.x = enemy.startX - enemy.range; enemy.direction = 1; }
                enemy.y = enemy.flyY + Math.sin(Date.now() * 0.005 + enemy.flyOffset) * enemy.flyRange;
            } else {
                enemy.x += enemy.direction * 1.2;
                if (enemy.x > enemy.startX + enemy.range) { enemy.x = enemy.startX + enemy.range; enemy.direction = -1; }
                if (enemy.x < enemy.startX - enemy.range) { enemy.x = enemy.startX - enemy.range; enemy.direction = 1; }
            }
            
            if (player.x + player.width > enemy.x && player.x < enemy.x + enemy.width &&
                player.y + player.height > enemy.y && player.y < enemy.y + enemy.height) {
                if (player.vy > 0 && player.y + player.height - enemy.y <= 15) {
                    enemy.alive = false;
                    levelCoinsCollected++;
                    totalScore += 50;
                    player.vy = -7;
                    updateUI();
                } else {
                    gameRunning = false;
                }
            }
        }
    }
    
    function updateCoins() {
        for (let coin of coins) {
            if (!coin.collected && player.x + player.width > coin.x && player.x < coin.x + coin.width &&
                player.y + player.height > coin.y && player.y < coin.y + coin.height) {
                coin.collected = true;
                levelCoinsCollected++;
                updateUI();
            }
        }
    }
    
    function updateCamera() {
        cameraX = player.x + player.width / 2 - canvas.width / 2;
        cameraX = Math.max(0, Math.min(levelWidth - canvas.width, cameraX));
    }
    
    function checkLevelComplete() {
        if (!levelCompleted && player.x >= levelWidth - 80) {
            levelCompleted = true;
            gameRunning = false;
            if (levelCoinsCollected >= requiredCoins) {
                if (currentLevel < levels.length) {
                    document.getElementById('levelCoins').innerText = levelCoinsCollected;
                    document.getElementById('levelNeed').innerText = requiredCoins;
                    document.getElementById('levelComplete').style.display = 'block';
                } else {
                    alert('Поздравляем! Вы прошли игру!');
                    restartGame();
                }
            } else {
                gameRunning = false;
                document.getElementById('gameOver').style.display = 'block';
                document.getElementById('finalScore').innerText = totalScore + levelCoinsCollected * 10;
                document.getElementById('finalCoins').innerText = globalCoins + levelCoinsCollected;
            }
        }
    }
    
    function nextLevel() {
        globalCoins += levelCoinsCollected;
        totalScore += levelCoinsCollected * 10;
        currentLevel++;
        loadLevel(currentLevel);
        document.getElementById('levelComplete').style.display = 'none';
        gameRunning = true;
        animate();
    }
    
    function restartGame() {
        totalScore = 0;
        globalCoins = 0;
        currentLevel = 1;
        loadLevel(1);
        document.getElementById('gameOver').style.display = 'none';
        document.getElementById('levelComplete').style.display = 'none';
        gameRunning = true;
        animate();
    }
    
    // Управление
    document.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if (key === 'a' || key === 'arrowleft') keys.left = true;
        if (key === 'd' || key === 'arrowright') keys.right = true;
        if (key === ' ' || key === 'arrowup' || key === 'w') { keys.jump = true; e.preventDefault(); }
    });
    document.addEventListener('keyup', (e) => {
        const key = e.key.toLowerCase();
        if (key === 'a' || key === 'arrowleft') keys.left = false;
        if (key === 'd' || key === 'arrowright') keys.right = false;
        if (key === ' ' || key === 'arrowup' || key === 'w') keys.jump = false;
    });
    window.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') e.preventDefault();
    });
    
    document.getElementById('restartBtn').addEventListener('click', restartGame);
    document.getElementById('nextLevelBtn').addEventListener('click', nextLevel);
    
    function animate() {
        if (!gameRunning) return;
        updatePlayer();
        updateCoins();
        updateEnemies();
        updateCamera();
        checkLevelComplete();
        
        drawBackground();
        drawPlatforms();
        drawEnemies();
        drawCoins();
        drawPlayer();
        
        animFrame = requestAnimationFrame(animate);
    }
    
    loadLevel(1);
    animate();
</script>
</body>
</html>
