name: Update Football Predictions

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
  push:

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install streamlit pandas numpy requests plotly python-dotenv schedule scipy
      
      - name: Create database
        run: python -c "from database import Database; db = Database()"
      
      - name: Fetch matches
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
        run: python -c "from data_fetcher import DataFetcher; from database import Database; fetcher = DataFetcher(); matches = fetcher.fetch_upcoming_matches(); print(f'Found {len(matches)} matches')"
      
      - name: Update git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto-update predictions"
          git push
